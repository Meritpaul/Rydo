<!DOCTYPE html>
<html>
<head>

    <title>Submit Offer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h2>Submit Offer</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>Offer Amount</label>

            <input
                type="number"
                name="amount"
                class="form-control"
                required
            >

        </div>

        <button class="btn btn-success">
            Submit Offer
        </button>

    </form>

</div>

</body>
</html>
