<!DOCTYPE html>
<html>
<head>

    <title>Offers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h2>Driver Offers</h2>

    <table class="table table-bordered">

        <thead>

        <tr>

            <th>Driver</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        {% for offer in offers %}

        <tr>

            <td>{{ offer.driver.username }}</td>

            <td>{{ offer.amount }}</td>

            <td>{{ offer.status }}</td>

            <td>

                <a
                    href="/offer/accept/{{ offer.id }}/"
                    class="btn btn-primary btn-sm"
                >
                    Accept
                </a>

            </td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
